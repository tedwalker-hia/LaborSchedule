version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NODE_ENV=development
        - export NPM_CONFIG_PRODUCTION=false
        - npm ci --include=dev --cache .npm --prefer-offline
    build:
      commands:
        - export NODE_ENV=production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
