version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        - node -v
        - export NODE_ENV=development
        - export NPM_CONFIG_PRODUCTION=false
        - npm ci --include=dev --cache .npm --prefer-offline
    build:
      commands:
        - export NODE_ENV=production
        - echo "==== AMPLIFY_YAML_BUILD_PHASE_REACHED ===="
        - rm -f .env.production
        - if [ -n "$JWT_SECRET" ]; then v="$(printf '%s' "$JWT_SECRET" | tr -d '\r' | sed -E 's/[[:space:]]+$//')"; printf "JWT_SECRET='%s'\n" "$v" >> .env.production; echo "wrote JWT_SECRET raw_len=${#JWT_SECRET} trimmed_len=${#v}"; else echo "WARN JWT_SECRET missing"; fi
        - if [ -n "$DATABASE_URL" ]; then v="$(printf '%s' "$DATABASE_URL" | tr -d '\r' | sed -E 's/[[:space:]]+$//')"; printf "DATABASE_URL='%s'\n" "$v" >> .env.production; echo "wrote DATABASE_URL raw_len=${#DATABASE_URL} trimmed_len=${#v}"; else echo "WARN DATABASE_URL missing"; fi
        - if [ -n "$AUDIT_ENABLED" ]; then v="$(printf '%s' "$AUDIT_ENABLED" | tr -d '\r' | sed -E 's/[[:space:]]+$//')"; printf "AUDIT_ENABLED='%s'\n" "$v" >> .env.production; echo "wrote AUDIT_ENABLED"; fi
        - if [ -n "$REDIS_URL" ]; then v="$(printf '%s' "$REDIS_URL" | tr -d '\r' | sed -E 's/[[:space:]]+$//')"; printf "REDIS_URL='%s'\n" "$v" >> .env.production; echo "wrote REDIS_URL"; fi
        - if [ -n "$HEALTH_DEBUG" ]; then v="$(printf '%s' "$HEALTH_DEBUG" | tr -d '\r' | sed -E 's/[[:space:]]+$//')"; printf "HEALTH_DEBUG='%s'\n" "$v" >> .env.production; echo "wrote HEALTH_DEBUG"; fi
        - echo "==== .env.production contents (keys only) ===="
        - awk -F= '{print $1}' .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - .next/cache/**/*
